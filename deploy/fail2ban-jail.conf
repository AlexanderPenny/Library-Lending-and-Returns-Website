# Append to /etc/fail2ban/jail.local, then: sudo systemctl restart fail2ban
#
# Set logpath to your install. Default policy below bans an IP for 1 hour
# after 5 failed logins within 10 minutes.
[lending-library]
enabled  = true
filter   = lending-library
logpath  = /home/CHANGEME/lending-library/logs/auth.log
maxretry = 5
findtime = 600
bantime  = 3600

# If the origin sits behind Cloudflare, a local firewall ban won't reach the
# visitor. Use Cloudflare's API action instead:
# banaction = cloudflare-zone
