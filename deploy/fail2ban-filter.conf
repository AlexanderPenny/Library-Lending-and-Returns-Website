# Copy to /etc/fail2ban/filter.d/lending-library.conf
#
# Matches failed logins written by the app to logs/auth.log, e.g.
#   2026-01-01T12:00:00.000Z LIBRARY_AUTH FAIL ip=203.0.113.9 email=someone@example.com
[Definition]
failregex = ^.*LIBRARY_AUTH FAIL ip=<HOST>
ignoreregex =
datepattern = ^%%Y-%%m-%%dT%%H:%%M:%%S
